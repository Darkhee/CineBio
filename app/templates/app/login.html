{% extends 'app/base.html' %}

{% block titulo %}Login - CineBio{% endblock %}
{% block nav_centro %}
<div class="nav-links">
    <a href="{% url 'listar_peliculas' %}">Películas</a>
    <a href="{% url 'confiteria' %}">Confitería</a>
</div>
{% endblock %}

{% block contenido %}

<div class="formulario-container">
    <h1>Iniciar sesión</h1>

    <form method="POST">
        {% csrf_token %}
        {{ formulario.as_p }}
        <button type="submit">Ingresar</button>
    </form>

    <a href="{% url 'registro' %}">¿No tienes cuenta? Regístrate</a>
</div>

{% endblock %}
