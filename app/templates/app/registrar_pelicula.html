<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Película</title>
</head>
<body>

    <h1>Registrar película</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ formulario.as_p }}

        <button type="submit">Guardar película</button>
    </form>

    <br>

    <a href="{% url 'listar_peliculas' %}">Ver películas</a>

</body>
</html>
